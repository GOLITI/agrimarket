# docker-compose.prod.yml pour production avec image Docker Hub
# Usage: docker-compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # Base de données PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: agrimarket_db_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-agrimarket}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agrimarket_network

  # Application Django depuis Docker Hub
  web:
    image: ${DOCKER_HUB_IMAGE:-marco225/agrimarket}:latest
    container_name: agrimarket_web_prod
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-agrimarket}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - JWT_SIGNING_KEY=${JWT_SIGNING_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agrimarket_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: agrimarket_redis_prod
    restart: unless-stopped
    networks:
      - agrimarket_network

  # Nginx (reverse proxy)
  nginx:
    image: nginx:alpine
    container_name: agrimarket_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - agrimarket_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  agrimarket_network:
    driver: bridge
