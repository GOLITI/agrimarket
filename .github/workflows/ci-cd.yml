name: AgriMarket CI/CD

on:
  push:
    branches: [main, develop]
    tags:
      - "v*"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: agrimarket_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/agrimarket_test
      SECRET_KEY: github-actions-secret-key
      JWT_SIGNING_KEY: github-actions-jwt-key
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DEBUG: "False"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django checks
        run: |
          python manage.py makemigrations --check --dry-run --no-input
          python manage.py migrate --noinput
          python manage.py check

      - name: Upload build context
        uses: actions/upload-artifact@v4
        with:
          name: build-context
          path: |
            requirements.txt
            manage.py
            config/
            users/
            products/
            orders/
            payments/
            dashboard/
          if-no-files-found: error

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: agrimarket_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/agrimarket_test
      SECRET_KEY: github-actions-secret-key
      JWT_SIGNING_KEY: github-actions-jwt-key
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DEBUG: "False"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite with coverage
        run: |
          python manage.py migrate --noinput
          pytest users/tests.py orders/tests.py products/tests.py payments/tests.py dashboard/tests.py \
            -n auto \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=pytest-report.xml \
            -v

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            coverage.xml
            pytest-report.xml
          if-no-files-found: error

  quality:
    name: Quality (SonarQube)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube quality gate
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  package:
    name: Package (Build and Push GHCR)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_ref: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  canary:
    name: Canary
    runs-on: ubuntu-latest
    needs: package
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Skip when CANARY_URL is not configured
        if: secrets.CANARY_URL == ''
        run: echo "CANARY_URL not configured, skipping canary check."

      - name: Canary smoke test
        if: secrets.CANARY_URL != ''
        run: |
          echo "Canary URL: ${{ secrets.CANARY_URL }}"
          for i in {1..20}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.CANARY_URL }}")
            if [ "$code" = "200" ]; then
              echo "Canary OK"
              exit 0
            fi
            sleep 10
          done
          echo "Canary check failed"
          exit 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: canary
    if: github.ref == 'refs/heads/main' && secrets.DEPLOY_HOST != ''
    environment:
      name: production
    steps:
      - name: Deploy on remote host
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            export CONTAINER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            export IMAGE_TAG=latest
            cd ${{ secrets.DEPLOY_PATH }}
            docker login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

  performance:
    name: Performance
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && secrets.PERFORMANCE_URL != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 smoke performance
        env:
          TARGET_URL: ${{ secrets.PERFORMANCE_URL }}
        run: k6 run .github/perf/smoke.js
