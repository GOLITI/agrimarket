# Pipeline CI/CD pour AgriMarket API
# Django REST Framework + PostgreSQL + pytest
# 
# Intégration Continue en 4 étapes :
# 1. BUILD : Compilation et intégration du code
# 2. TEST : Tests automatisés
# 3. QUALITY : Mesure de la qualité du code
# 4. PACKAGE : Gestion des livrables

image: python:3.12

# Définition des 4 stages de l'IC
stages:
  - build        # 1. Compilation et intégration du code
  - test         # 2. Tests du code
  - quality      # 3. Mesure de la qualité du code
  - package      # 4. Gestion des livrables (artefacts/déploiement)

# Cache pour accélérer les builds (seulement pip cache, pas venv)
cache:
  key:
    files:
      - requirements.txt
  paths:
    - .cache/pip

# Variables globales
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DJANGO_SETTINGS_MODULE: "config.settings"
  POSTGRES_DB: agrimarket_test
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_HOST: postgres
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/agrimarket_test"

# Template pour installation des dépendances (seulement pour build:install)
.install_dependencies: &install_dependencies
  - python -m venv venv
  - source venv/bin/activate || . venv/Scripts/activate
  - pip install --upgrade pip
  - pip install -r requirements.txt

# Template pour activer venv existant
.activate_venv: &activate_venv
  - source venv/bin/activate || . venv/Scripts/activate

# Template de base avec PostgreSQL
.with_postgres: &with_postgres
  services:
    - postgres:15
  before_script:
    - *activate_venv
  dependencies:
    - build:install

# ============================================
# ÉTAPE 1 : BUILD - COMPILATION ET INTÉGRATION
# ============================================

# Vérification de la compilation Python et des dépendances
build:install:
  stage: build
  script:
    - *install_dependencies
    - python --version
    - pip --version
    - pip list
  artifacts:
    paths:
      - venv/
    expire_in: 1 hour
  only:
    - merge_requests
    - main
    - develop

# Vérification de la configuration Django
build:check:
  stage: build
  needs: [build:install]
  before_script:
    - *activate_venv
  script:
    - python manage.py makemigrations --check --dry-run --no-input
    - python manage.py migrate --noinput
    - python manage.py check
  dependencies:
    - build:install
  only:
    - merge_requests
    - main
    - develop

# Génération des migrations
build:migrations:
  stage: build
  needs: [build:install]
  <<: *with_postgres
  script:
    - python manage.py makemigrations --check --dry-run --no-input
  only:
    - merge_requests
    - main

# Collecte des fichiers statiques
build:collectstatic:
  stage: build
  needs: [build:install]
  before_script:
    - *activate_venv
  script:
    - python manage.py collectstatic --noinput --clear
  dependencies:
    - build:install
  artifacts:
    paths:
      - staticfiles/
    expire_in: 1 day
  only:
    - main

# ============================================
# ÉTAPE 2 : TEST - TESTS DU CODE
# ============================================

# Template pour les tests
.test_template: &test_template
  stage: test
  <<: *with_postgres
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'

# Tests unitaires par application
test:users:
  <<: *test_template
  script:
    - python manage.py migrate --noinput
    - pytest users/tests.py -v -n auto --cov=users --cov-report=term --cov-report=html --cov-report=xml
  artifacts:
    paths:
      - htmlcov/
      - coverage.xml
    expire_in: 1 week
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

test:products:
  <<: *test_template
  script:
    - python manage.py migrate --noinput
    - pytest products/tests.py -v -n auto --cov=products --cov-report=term --cov-report=html
  artifacts:
    paths:
      - htmlcov/
    expire_in: 1 week

test:orders:
  <<: *test_template
  script:
    - python manage.py migrate --noinput
    - pytest orders/tests.py -v -n auto --cov=orders --cov-report=term --cov-report=html
  artifacts:
    paths:
      - htmlcov/
    expire_in: 1 week

test:payments:
  <<: *test_template
  script:
    - python manage.py migrate --noinput
    - pytest payments/tests.py -v --cov=payments --cov-report=term --cov-report=html
  artifacts:
    paths:
      - htmlcov/
    expire_in: 1 week

test:dashboard:
  <<: *test_template
  script:
    - python manage.py migrate --noinput
    - pytest dashboard/tests.py -v --cov=dashboard --cov-report=term --cov-report=html
  artifacts:
    paths:
      - htmlcov/
    expire_in: 1 week

# Tests d'intégration complets
test:integration:
  <<: *test_template
  script:
    - python manage.py migrate --noinput
    - pytest users/tests.py orders/tests.py products/tests.py payments/tests.py dashboard/tests.py -n auto --cov=. --cov-report=term-missing --cov-report=html --cov-report=xml --junitxml=report.xml -v
  artifacts:
    when: always
    paths:
      - htmlcov/
      - coverage.xml
      - report.xml
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 30 days
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  only:
    - main
    - merge_requests

# Tests de performance
test:performance:
  <<: *test_template
  script:
    - python manage.py migrate --noinput
    - pytest users/tests.py orders/tests.py products/tests.py payments/tests.py dashboard/tests.py --durations=10 -v
  allow_failure: true
  only:
    - main
    - merge_requests

# ============================================
# ÉTAPE 3 : QUALITY - MESURE DE LA QUALITÉ
# ============================================

# Analyse statique du code avec Ruff
quality:lint:
  stage: quality
  needs: [build:install]
  script:
    # Réutiliser ruff du cache au lieu de réinstaller
    - source venv/bin/activate || . venv/Scripts/activate
    - pip list | grep ruff || pip install ruff
    - ruff check . --select E,F,W,C,N --exclude venv --output-format=gitlab > ruff-report.json || true
    - ruff check . --exclude venv --statistics || true
  artifacts:
    reports:
      codequality: ruff-report.json
    paths:
      - ruff-report.json
    expire_in: 1 week
  dependencies:
    - build:install
  allow_failure: true
  only:
    - merge_requests
    - main
    - develop

# Analyse de la couverture de code
quality:coverage:
  stage: quality
  needs: [build:install]
  <<: *with_postgres
  script:
    - python manage.py migrate --noinput
    - pytest users/tests.py orders/tests.py products/tests.py payments/tests.py dashboard/tests.py -n auto --cov=. --cov-report=term --cov-report=html --cov-report=xml
    - coverage report --fail-under=70
  artifacts:
    paths:
      - htmlcov/
      - coverage.xml
    expire_in: 30 days
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  dependencies:
    - build:install
  only:
    - main
    - merge_requests

# Analyse de sécurité avec Safety
quality:security:
  stage: quality
  needs: [build:install]
  script:
    - source venv/bin/activate || . venv/Scripts/activate
    - pip list | grep safety || pip install safety bandit
    # Safety vérifie les vulnérabilités des dépendances (rapide)
    - safety check --json --output safety-report.json || true
    # Bandit scanne seulement le code applicatif (pas venv/)
    - bandit -r config/ dashboard/ orders/ payments/ products/ users/ -f json -o bandit-report.json || true
    - echo "Vérification de sécurité terminée"
  artifacts:
    paths:
      - safety-report.json
      - bandit-report.json
    expire_in: 1 week
  dependencies:
    - build:install
  allow_failure: true
  only:
    - merge_requests
    - main

# Analyse de complexité du code
quality:complexity:
  stage: quality
  needs: [build:install]
  script:
    - source venv/bin/activate || . venv/Scripts/activate
    - pip list | grep radon || pip install radon
    - radon cc config/ dashboard/ orders/ payments/ products/ users/ -a -s
    - radon mi config/ dashboard/ orders/ payments/ products/ users/ -s
  dependencies:
    - build:install
  allow_failure: true
  only:
    - main
    - merge_requests

# ============================================
# ÉTAPE 4 : PACKAGE - GESTION DES LIVRABLES
# ============================================

# Génération de la documentation API
package:docs:
  stage: package
  needs: [build:install]
  before_script:
    - *activate_venv
  script:
    - python manage.py spectacular --color --file schema.yml
    - python manage.py spectacular --validate
  dependencies:
    - build:install
  artifacts:
    name: "api-documentation-${CI_COMMIT_SHORT_SHA}"
    paths:
      - schema.yml
    expire_in: 90 days
  only:
    - main
    - tags

# Construction et publication de l'image Docker sur GitLab Container Registry
# Utilise le registry GitLab au lieu de Docker Hub pour une intégration native
package:docker:
  stage: package
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_BUILDKIT: "1"
    # Utiliser le GitLab Container Registry
    IMAGE_NAME: $CI_REGISTRY_IMAGE
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  script:
    # Déterminer la version : utilise le tag Git si disponible, sinon v1.0.0-dev
    - export IMAGE_VERSION="${CI_COMMIT_TAG:-v1.0.0-dev}"
    - echo "Building Docker image with version $IMAGE_VERSION"
    - docker build --pull -t $IMAGE_NAME:$IMAGE_VERSION .
    - docker tag $IMAGE_NAME:$IMAGE_VERSION $IMAGE_NAME:build-${CI_PIPELINE_ID}
    # Tag latest uniquement sur la branche main (pas sur les tags)
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ]; then
        docker tag $IMAGE_NAME:$IMAGE_VERSION $IMAGE_NAME:latest
        docker push $IMAGE_NAME:latest
      fi
    - docker push $IMAGE_NAME:$IMAGE_VERSION
    - docker push $IMAGE_NAME:build-${CI_PIPELINE_ID}
    - echo "Image publiée sur GitLab Container Registry → $IMAGE_NAME:$IMAGE_VERSION"
  dependencies: []
  only:
    - main
    - tags

# Création d'une release
package:release:
  stage: package
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  before_script:
    - apk add --no-cache curl jq
  script:
    - echo "Création de la release $CI_COMMIT_TAG"
  release:
    tag_name: '$CI_COMMIT_TAG'
    description: 'Release $CI_COMMIT_TAG - AgriMarket API'
  only:
    - tags

# Archivage des artefacts de production
package:archive:
  stage: package
  needs: [build:install]
  before_script:
    - *activate_venv
  script:
    - python manage.py collectstatic --noinput
    - mkdir -p archive-build
    - cp -r config dashboard orders payments products users manage.py requirements.txt Dockerfile docker-compose*.yml nginx.conf staticfiles archive-build/ 2>/dev/null || true
    - tar -czf agrimarket-${CI_COMMIT_SHORT_SHA}.tar.gz -C archive-build .
  dependencies:
    - build:install
  artifacts:
    name: "agrimarket-${CI_COMMIT_SHORT_SHA}"
    paths:
      - agrimarket-${CI_COMMIT_SHORT_SHA}.tar.gz
      - staticfiles/
    expire_in: 6 months
  only:
    - main
    - tags

# ============================================
# DÉPLOIEMENT (optionnel après package)
# ============================================

# Déploiement en staging
deploy:staging:
  stage: package
  before_script:
    - *activate_venv
  script:
    - echo "Déploiement en staging..."
    - python manage.py collectstatic --noinput
    - echo "Staging déployé avec succès!"
  environment:
    name: staging
    url: https://staging.agrimarket.example.com
    deployment_tier: staging
  dependencies:
    - build:install
    - package:archive
  only:
    - develop
  when: manual

# Déploiement en production
deploy:production:
  stage: package
  before_script:
    - *activate_venv
  script:
    - echo "Déploiement en production..."
    - python manage.py migrate --noinput
    - python manage.py collectstatic --noinput
    - echo "Production déployée avec succès!"
  environment:
    name: production
    url: https://agrimarket.example.com
    deployment_tier: production
  dependencies:
    - build:install
    - package:archive
    - package:docker
  only:
    - main
    - tags
  when: manual